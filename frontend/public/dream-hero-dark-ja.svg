<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Dream Log hero illustration (dark, Japanese)">
  <defs>
    <radialGradient id="glow" cx="600" cy="380" r="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.35"/>
    </linearGradient>
    <style>
      .jp{font-family: ui-sans-serif, system-ui, "Noto Sans JP", "Yu Gothic UI", "Yu Gothic", "Meiryo", "MS PGothic", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Segoe UI", Arial, sans-serif;}
      .t1{font-weight: 800; fill:#f8fafc;}
      .t2{font-weight: 500; fill:#a1a1aa;}
      .t3{font-weight: 800; fill:#e4e4e7;}
      .t4{font-weight: 700; fill:#111111;}
      .t5{font-weight: 700; fill:#52525b;}
    </style>
  </defs>

  <rect width="1200" height="800" fill="#0a0a0a"/>
  <circle cx="600" cy="380" r="430" fill="url(#glow)"/>

  <rect x="90" y="90" width="1020" height="620" rx="22" fill="#151518" stroke="#2c2c33" stroke-width="2"/>
  <rect x="90" y="90" width="1020" height="68" rx="22" fill="#222228"/>
  <rect x="90" y="158" width="1020" height="1" fill="#2f2f35"/>

  <circle cx="135" cy="124" r="14" fill="#a78bfa"/>
  <rect x="160" y="115" width="110" height="18" rx="4" fill="#40404a"/>
  <rect x="330" y="115" width="70" height="18" rx="4" fill="#35353d"/>
  <rect x="420" y="115" width="70" height="18" rx="4" fill="#35353d"/>
  <rect x="510" y="115" width="70" height="18" rx="4" fill="#35353d"/>
  <rect x="905" y="110" width="170" height="28" rx="9" fill="#a78bfa"/>

  <g transform="translate(140, 190)">
    <text x="0" y="0" class="jp t1" font-size="28">昨夜の夢を、やさしく読み解く</text>
    <text x="0" y="34" class="jp t2" font-size="16">夢日記 · AI分析 · ひらめき · 共感のつながり</text>

    <rect x="0" y="60" width="420" height="10" rx="5" fill="url(#accent)"/>
    <rect x="0" y="82" width="360" height="8" rx="4" fill="#3a3a44"/>

    <rect x="0" y="120" width="420" height="150" rx="16" fill="#1f1f25" stroke="#2d2d35"/>
    <text x="24" y="150" class="jp t3" font-size="16">夢ログ</text>
    <text x="24" y="176" class="jp t2" font-size="13">キーワード: 海 · 灯台 · 星明かり</text>
    <rect x="24" y="192" width="260" height="8" rx="4" fill="#2f2f38"/>
    <rect x="24" y="208" width="300" height="8" rx="4" fill="#2f2f38"/>
    <rect x="24" y="224" width="220" height="8" rx="4" fill="#2f2f38"/>
    <rect x="24" y="238" width="148" height="26" rx="8" fill="#a78bfa"/>
    <text x="36" y="256" class="jp t4" font-size="12">分析を生成</text>

    <rect x="450" y="120" width="420" height="150" rx="16" fill="#1f1f25" stroke="#2d2d35"/>
    <text x="474" y="150" class="jp t3" font-size="16">AIインサイト</text>
    <rect x="474" y="170" width="120" height="8" rx="4" fill="#60a5fa"/>
    <rect x="474" y="186" width="300" height="8" rx="4" fill="#2f2f38"/>
    <rect x="474" y="202" width="270" height="8" rx="4" fill="#2f2f38"/>
    <rect x="474" y="218" width="230" height="8" rx="4" fill="#2f2f38"/>
    <rect x="474" y="234" width="170" height="8" rx="4" fill="#2f2f38"/>

    <rect x="0" y="290" width="270" height="120" rx="16" fill="#1f1f25" stroke="#2d2d35"/>
    <text x="24" y="320" class="jp t3" font-size="14">感情の傾向</text>
    <rect x="24" y="340" width="80" height="8" rx="4" fill="#a78bfa"/>
    <rect x="24" y="358" width="210" height="8" rx="4" fill="#2f2f38"/>

    <rect x="300" y="290" width="270" height="120" rx="16" fill="#1f1f25" stroke="#2d2d35"/>
    <text x="324" y="320" class="jp t3" font-size="14">夢の辞典</text>
    <rect x="324" y="340" width="120" height="8" rx="4" fill="#60a5fa"/>
    <rect x="324" y="358" width="200" height="8" rx="4" fill="#2f2f38"/>

    <rect x="600" y="290" width="270" height="120" rx="16" fill="#1f1f25" stroke="#2d2d35"/>
    <text x="624" y="320" class="jp t3" font-size="14">コミュニティ</text>
    <rect x="624" y="340" width="170" height="8" rx="4" fill="#a78bfa"/>
    <rect x="624" y="358" width="190" height="8" rx="4" fill="#2f2f38"/>
  </g>

  <g opacity="0.9">
    <circle cx="950" cy="245" r="42" fill="#a78bfa" opacity="0.20"/>
    <circle cx="965" cy="235" r="36" fill="#0a0a0a"/>
  </g>

  <g opacity="0.65">
    <circle cx="210" cy="240" r="2" fill="#c4b5fd"/>
    <circle cx="360" cy="205" r="2" fill="#c084fc"/>
    <circle cx="870" cy="360" r="2" fill="#93c5fd"/>
    <circle cx="1040" cy="300" r="2" fill="#a78bfa"/>
    <circle cx="170" cy="660" r="2" fill="#c4b5fd"/>
    <circle cx="1010" cy="620" r="2" fill="#93c5fd"/>
  </g>

  <text x="600" y="740" class="jp t5" font-size="20" text-anchor="middle">Dream Log · 夢を記録し、内なる世界を発見する</text>
</svg>
