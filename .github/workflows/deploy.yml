# Monorepo CI/CD 部署工作流
# 使用不可变镜像标签和智能变更检测，确保部署的稳定性和一致性

name: Monorepo CI/CD Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: '强制重新构建所有镜像 (后端和前端)'
        required: false
        default: false
        type: boolean
      force_rebuild_backend:
        description: '强制重新构建后端镜像 (如果 all 未勾选)'
        required: false
        default: false
        type: boolean
      force_rebuild_frontend:
        description: '强制重新构建前端镜像 (如果 all 未勾选)'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ secrets.ACR_REGISTRY || 'crpi-nwtbgdcxek2l5bfv.cn-hangzhou.personal.cr.aliyuncs.com' }}
  NAMESPACE: ${{ secrets.ACR_NAMESPACE || 'dream-log-repo' }}

jobs:
  # 变更检测作业
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      nginx: ${{ steps.changes.outputs.nginx }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event.before }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            nginx:
              - 'nginx/**'
            docker:
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  # 后端构建作业
  build-backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.force_rebuild_all == 'true' ||
        github.event.inputs.force_rebuild_backend == 'true'
      ))
    runs-on: ubuntu-22.04
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${{ steps.short-sha.outputs.sha }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.force_rebuild_all == 'true' || github.event.inputs.force_rebuild_backend == 'true') }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          platforms: linux/amd64

  # 前端构建作业
  build-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.nginx == 'true' ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.force_rebuild_all == 'true' ||
        github.event.inputs.force_rebuild_frontend == 'true'
      ))
    runs-on: ubuntu-22.04
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${{ steps.short-sha.outputs.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://dreamlog.xyz' }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.force_rebuild_all == 'true' || github.event.inputs.force_rebuild_frontend == 'true') }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          platforms: linux/amd64

  # 部署作业
  deploy:
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (
        needs.build-backend.result == 'success' ||
        needs.build-frontend.result == 'success' ||
        (needs.detect-changes.outputs.docker == 'true') ||
        (needs.detect-changes.outputs.nginx == 'true')
      )
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - name: Deploy to Server (with retries)
        uses: nick-fields/retry@v3.0.0
        with:
          max_attempts: 3
          timeout_minutes: 25
          retry_wait_seconds: 20
          command: |
            set -euo pipefail

            HOST="${{ secrets.SERVER_HOST }}"
            USERNAME="${{ secrets.SERVER_USER }}"
            PROJECT_PATH="${{ secrets.PROJECT_PATH || '/root/dream-log' }}"
            SSH_PRIVATE_KEY="${{ secrets.SSH_PRIVATE_KEY }}"
            SSH_PASSPHRASE="${{ secrets.SSH_PASSPHRASE }}"

            # 使用私有临时目录（700）存放敏感文件：避免 /tmp 可列出导致的侧信道
            TMP_SSH_DIR="$(mktemp -d)"
            chmod 700 "$TMP_SSH_DIR"
            KEY_FILE="$TMP_SSH_DIR/id_ed25519"
            ASKPASS_FILE="$TMP_SSH_DIR/askpass.sh"

            printf '%s\n' "$SSH_PRIVATE_KEY" > "$KEY_FILE"
            chmod 600 "$KEY_FILE"

            # 如果私钥带 passphrase，则通过 SSH_ASKPASS 注入（兼容无交互环境）
            if [ -n "${SSH_PASSPHRASE}" ]; then
              cat > "$ASKPASS_FILE" <<'EOF'
            #!/usr/bin/env bash
            printf '%s\n' "$SSH_PASSPHRASE"
            EOF
              chmod 700 "$ASKPASS_FILE"
              eval "$(ssh-agent -s)"
              export SSH_ASKPASS="$ASKPASS_FILE"
              export SSH_ASKPASS_REQUIRE=force
              export DISPLAY=:0
              export SSH_PASSPHRASE
              # 显式传递 SSH agent 环境变量，避免 setsid 争议导致无法连接 agent
              setsid -w env \
                SSH_AUTH_SOCK="$SSH_AUTH_SOCK" \
                SSH_AGENT_PID="$SSH_AGENT_PID" \
                SSH_ASKPASS="$SSH_ASKPASS" \
                SSH_ASKPASS_REQUIRE="$SSH_ASKPASS_REQUIRE" \
                DISPLAY="$DISPLAY" \
                SSH_PASSPHRASE="$SSH_PASSPHRASE" \
                ssh-add "$KEY_FILE" </dev/null
            fi

            PROJECT_PATH_SAFE="$(printf '%q' "$PROJECT_PATH")"
            ssh -i "$KEY_FILE" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=4 \
              "${USERNAME}@${HOST}" \
              "PROJECT_PATH=${PROJECT_PATH_SAFE} bash -s" <<'REMOTE_SCRIPT'
            set -euo pipefail
            cd "$PROJECT_PATH"

            echo "登录容器注册表..."
            echo "${{ secrets.ACR_PASSWORD }}" | sudo docker login ${{ env.REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

            SERVICES_TO_RESTART=""

            if [ "${{ needs.build-backend.result }}" = "success" ]; then
              IMAGE_TAG="${{ needs.build-backend.outputs.image-tag }}"
              BACKEND_IMAGE_URI="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${IMAGE_TAG}"

              grep -q '^BACKEND_IMAGE_URI=' .env.deployment && \
                sudo sed -i "s|^BACKEND_IMAGE_URI=.*|BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}|" .env.deployment || \
                echo "BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}" | sudo tee -a .env.deployment >/dev/null

              sudo docker pull "$BACKEND_IMAGE_URI"
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART backend worker"
            fi

            if [ "${{ needs.build-frontend.result }}" = "success" ]; then
              IMAGE_TAG="${{ needs.build-frontend.outputs.image-tag }}"
              FRONTEND_IMAGE_URI="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${IMAGE_TAG}"

              grep -q '^FRONTEND_IMAGE_URI=' .env.deployment && \
                sudo sed -i "s|^FRONTEND_IMAGE_URI=.*|FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}|" .env.deployment || \
                echo "FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}" | sudo tee -a .env.deployment >/dev/null

              sudo docker pull "$FRONTEND_IMAGE_URI"
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART frontend"
            fi

            if [ -n "$SERVICES_TO_RESTART" ]; then
              echo "重启服务: $SERVICES_TO_RESTART"
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate $SERVICES_TO_RESTART
            elif [ "${{ needs.detect-changes.outputs.docker }}" = "true" ] || [ "${{ needs.detect-changes.outputs.nginx }}" = "true" ]; then
              echo "重新加载所有服务..."
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate
            else
              echo "无需部署更新"
            fi

            sudo docker image prune -f
            echo "部署完成！"
            REMOTE_SCRIPT

            rm -rf "$TMP_SSH_DIR" || true
            if command -v ssh-agent >/dev/null 2>&1; then ssh-agent -k >/dev/null 2>&1 || true; fi
