# Monorepo CI/CD 部署工作流
# 使用不可变镜像标签和智能变更检测，确保部署的稳定性和一致性

name: Smart CI/CD Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_rebuild_backend:
        description: '强制重新构建后端镜像'
        required: false
        default: false
        type: boolean
      force_rebuild_frontend:
        description: '强制重新构建前端镜像'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}

jobs:
  # 变更检测作业
  detect-changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 获取所有历史记录，确保能够找到正确的比较基准
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event_name == 'push' && github.event.before }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  # 后端构建作业
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebuild_backend == 'true'
    runs-on: ubuntu-22.04
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${{ steps.short-sha.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          platforms: linux/amd64

  # 前端构建作业
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebuild_frontend == 'true'
    runs-on: ubuntu-22.04
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${{ steps.short-sha.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          platforms: linux/amd64

  # 部署作业
  deploy:
    # 确保此作业在变更检测和所有构建作业之后运行
    needs: [detect-changes, build-backend, build-frontend]
    # 仅在主分支 push 事件时运行
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (
        needs.build-backend.result == 'success' ||
        needs.build-frontend.result == 'success' ||
        (needs.detect-changes.outputs.docker == 'true')
      )
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -e
            cd ${{ secrets.PROJECT_PATH }}
            
            echo "登录容器注册表..."
            echo "${{ secrets.ACR_PASSWORD }}" | sudo docker login ${{ env.REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
            
            # 初始化一个变量，用于收集需要重启的服务
            SERVICES_TO_RESTART=""
            
            # 只有在后端镜像被成功构建时，才执行相关操作
            if [ "${{ needs.build-backend.result }}" = "success" ]; then
              echo "后端镜像已构建，准备拉取并标记待重启服务..."
              IMAGE_TAG="${{ needs.build-backend.outputs.image-tag }}"
              BACKEND_IMAGE_URI="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${IMAGE_TAG}"
              echo "后端镜像 URI: $BACKEND_IMAGE_URI"
              
              # 更新 .env.deployment 文件
              grep -q '^BACKEND_IMAGE_URI=' .env.deployment && sed -i "s|^BACKEND_IMAGE_URI=.*|BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}|" .env.deployment || echo "BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}" >> .env.deployment
              
              # 拉取镜像并添加服务到重启列表
              sudo docker pull "$BACKEND_IMAGE_URI"
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART backend worker_default beat"
            fi
            
            # 只有在前端镜像被成功构建时，才执行相关操作
            if [ "${{ needs.build-frontend.result }}" = "success" ]; then
              echo "前端镜像已构建，准备拉取并标记待重启服务..."
              IMAGE_TAG="${{ needs.build-frontend.outputs.image-tag }}"
              FRONTEND_IMAGE_URI="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${IMAGE_TAG}"
              echo "前端镜像 URI: $FRONTEND_IMAGE_URI"
              
              # 更新 .env.deployment 文件
              grep -q '^FRONTEND_IMAGE_URI=' .env.deployment && sed -i "s|^FRONTEND_IMAGE_URI=.*|FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}|" .env.deployment || echo "FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}" >> .env.deployment
              
              # 拉取镜像并添加服务到重启列表
              sudo docker pull "$FRONTEND_IMAGE_URI"
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART frontend-nginx"
            fi

            # 如果有服务需要重启，则执行一次性的 docker compose up 命令
            if [ -n "$SERVICES_TO_RESTART" ]; then
              echo "准备重启服务: $SERVICES_TO_RESTART"
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate $SERVICES_TO_RESTART
            # 如果只有 docker 相关文件发生变化，则重新加载所有服务
            elif [ "${{ needs.detect-changes.outputs.docker }}" = "true" ]; then
              echo "检测到 Docker 相关文件变更，正在重新加载所有服务..."
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate
            else
              echo "没有需要部署的镜像更新。"
            fi
            
            echo "清理未使用的镜像..."
            sudo docker image prune -f
            
            echo "部署完成！"
