# Monorepo CI/CD 部署工作流
# 使用不可变镜像标签和智能变更检测，确保部署的稳定性和一致性

name: Monorepo CI/CD Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: '强制重新构建所有镜像 (后端和前端)'
        required: false
        default: false
        type: boolean
      force_rebuild_backend:
        description: '强制重新构建后端镜像 (如果 all 未勾选)'
        required: false
        default: false
        type: boolean
      force_rebuild_frontend:
        description: '强制重新构建前端镜像 (如果 all 未勾选)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}

jobs:
  # 变更检测作业
  detect-changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      nginx: ${{ steps.changes.outputs.nginx }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event.before }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            nginx:
              - 'nginx/**'
            docker:
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  # 后端构建作业
  build-backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.force_rebuild_all == 'true' ||
        github.event.inputs.force_rebuild_backend == 'true'
      ))
    runs-on: ubuntu-22.04
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${{ steps.short-sha.outputs.sha }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.force_rebuild_all == 'true' || github.event.inputs.force_rebuild_backend == 'true') }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          platforms: linux/amd64

  # 前端构建作业
  build-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.nginx == 'true' ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.force_rebuild_all == 'true' ||
        github.event.inputs.force_rebuild_frontend == 'true'
      ))
    runs-on: ubuntu-22.04
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # 将构建上下文切到仓库根目录，以便COPY nginx/nginx.conf
          context: .
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${{ steps.short-sha.outputs.sha }}
          build-args: |
            FORCE_REINSTALL_DEPS=${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.force_rebuild_all == 'true' || github.event.inputs.force_rebuild_frontend == 'true') }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.force_rebuild_all == 'true' || github.event.inputs.force_rebuild_frontend == 'true') }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          platforms: linux/amd64

  # 部署作业
  deploy:
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (
        needs.build-backend.result == 'success' ||
        needs.build-frontend.result == 'success' ||
        (needs.detect-changes.outputs.docker == 'true') ||
        (needs.detect-changes.outputs.nginx == 'true')
      )
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -e
            cd ${{ secrets.PROJECT_PATH }}
            
            echo "登录容器注册表..."
            echo "${{ secrets.ACR_PASSWORD }}" | sudo docker login ${{ env.REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
            
            # 需要拉取的镜像标记（由构建作业决定）
            PULL_BACKEND=false
            PULL_FRONTEND=false
            
            SERVICES_TO_RESTART=""
            
            # 后端镜像：构建成功则更新引用并标记需要拉取
            if [ "${{ needs.build-backend.result }}" = "success" ]; then
              IMAGE_TAG="${{ needs.build-backend.outputs.image-tag }}"
              BACKEND_IMAGE_URI="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${IMAGE_TAG}"
              
              echo "设置后端镜像引用: $BACKEND_IMAGE_URI"
              grep -q '^BACKEND_IMAGE_URI=' .env.deployment && sed -i "s|^BACKEND_IMAGE_URI=.*|BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}|" .env.deployment || echo "BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}" >> .env.deployment
              PULL_BACKEND=true
              BACKEND_IMAGE_TO_PULL="$BACKEND_IMAGE_URI"
            fi
            
            # 前端镜像：构建成功则更新引用并标记需要拉取
            if [ "${{ needs.build-frontend.result }}" = "success" ]; then
              IMAGE_TAG="${{ needs.build-frontend.outputs.image-tag }}"
              FRONTEND_IMAGE_URI="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${IMAGE_TAG}"
              
              echo "设置前端镜像引用: $FRONTEND_IMAGE_URI"
              grep -q '^FRONTEND_IMAGE_URI=' .env.deployment && sed -i "s|^FRONTEND_IMAGE_URI=.*|FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}|" .env.deployment || echo "FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}" >> .env.deployment
              PULL_FRONTEND=true
              FRONTEND_IMAGE_TO_PULL="$FRONTEND_IMAGE_URI"
            fi

            # 并行拉取所有需要拉取的镜像（始终拉取以确保获取到最新Digest，未变更时网络与IO消耗极小）
            if [ "$PULL_BACKEND" = "true" ] && [ "$PULL_FRONTEND" = "true" ]; then
              echo "并行拉取后端和前端镜像..."
              sudo docker pull "$BACKEND_IMAGE_TO_PULL" &
              BACKEND_PID=$!
              sudo docker pull "$FRONTEND_IMAGE_TO_PULL" &
              FRONTEND_PID=$!
              
              # 等待所有并行拉取完成
              wait $BACKEND_PID
              BACKEND_RESULT=$?
              wait $FRONTEND_PID  
              FRONTEND_RESULT=$?
              
              if [ $BACKEND_RESULT -ne 0 ] || [ $FRONTEND_RESULT -ne 0 ]; then
                echo "镜像拉取失败"
                exit 1
              fi
              echo "并行拉取完成"
            elif [ "$PULL_BACKEND" = "true" ]; then
              echo "拉取后端镜像..."
              sudo docker pull "$BACKEND_IMAGE_TO_PULL"
            elif [ "$PULL_FRONTEND" = "true" ]; then
              echo "拉取前端镜像..."
              sudo docker pull "$FRONTEND_IMAGE_TO_PULL"
            else
              echo "无镜像需要拉取"
            fi

            # 基于镜像ID对比决定是否重启，避免无谓重启
            if [ "${{ needs.build-backend.result }}" = "success" ]; then
              CURRENT_BACKEND_IMAGE_ID=$(sudo docker inspect -f '{{.Image}}' dream_log_backend_daphne 2>/dev/null || echo none)
              NEW_BACKEND_IMAGE_ID=$(sudo docker image inspect -f '{{.Id}}' "$BACKEND_IMAGE_URI" 2>/dev/null || echo none)
              if [ "$CURRENT_BACKEND_IMAGE_ID" != "$NEW_BACKEND_IMAGE_ID" ]; then
                echo "检测到后端镜像变更，计划重启 backend/worker_io_cluster/beat"
                SERVICES_TO_RESTART="$SERVICES_TO_RESTART backend worker_io_cluster beat"
              else
                echo "后端镜像未变化，跳过重启"
              fi
            fi

            if [ "${{ needs.build-frontend.result }}" = "success" ]; then
              CURRENT_FRONTEND_IMAGE_ID=$(sudo docker inspect -f '{{.Image}}' dream_log_nginx 2>/dev/null || echo none)
              NEW_FRONTEND_IMAGE_ID=$(sudo docker image inspect -f '{{.Id}}' "$FRONTEND_IMAGE_URI" 2>/dev/null || echo none)
              if [ "$CURRENT_FRONTEND_IMAGE_ID" != "$NEW_FRONTEND_IMAGE_ID" ]; then
                echo "检测到前端镜像变更，计划重启 frontend-nginx"
                SERVICES_TO_RESTART="$SERVICES_TO_RESTART frontend-nginx"
              else
                echo "前端镜像未变化，跳过重启"
              fi
            fi

            if [ -n "$SERVICES_TO_RESTART" ]; then
              echo "重启服务: $SERVICES_TO_RESTART"
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate $SERVICES_TO_RESTART
            elif [ "${{ needs.detect-changes.outputs.docker }}" = "true" ] || [ "${{ needs.detect-changes.outputs.nginx }}" = "true" ]; then
              echo "重新加载所有服务..."
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate
            else
              echo "无需部署更新"
            fi
            
            # 智能镜像清理：只保留最近的3个版本，避免磁盘空间不足
            echo "清理旧镜像..."
            # 清理悬空镜像
            sudo docker image prune -f
            # 清理旧版本镜像，保留最近3个
            sudo docker images "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend" --format "{{.Tag}} {{.ID}}" | sort -r | tail -n +4 | awk '{print $2}' | xargs -r sudo docker rmi -f || true
            sudo docker images "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend" --format "{{.Tag}} {{.ID}}" | sort -r | tail -n +4 | awk '{print $2}' | xargs -r sudo docker rmi -f || true
            
            echo "✅ 部署完成！优化的CI/CD流程已生效"
