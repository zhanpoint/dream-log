# Monorepo CI/CD 部署工作流
# 使用不可变镜像标签和智能变更检测，确保部署的稳定性和一致性

name: Smart CI/CD Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}

jobs:
  # 变更检测作业
  detect-changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 获取所有历史记录，确保能够找到正确的比较基准
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          # 显式指定比较基准为 push 事件前一个 commit
          # 这是修复变更检测不准确问题的核心
          base: ${{ github.event.before }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  # 后端构建作业
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-22.04
    outputs:
      image-uri: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-backend:${{ steps.short-sha.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          platforms: linux/amd64

  # 前端构建作业
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-22.04
    outputs:
      image-uri: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/dream-log-frontend:${{ steps.short-sha.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          platforms: linux/amd64

  # 部署作业
  deploy:
    # 确保此作业在变更检测和所有构建作业之后运行
    needs: [detect-changes, build-backend, build-frontend]
    # 仅在主分支 push 事件时运行
    if: |
      always() && 
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' &&
      (
        needs.build-backend.result == 'success' ||
        needs.build-frontend.result == 'success' ||
        (needs.detect-changes.outputs.docker == 'true')
      )
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            cd ${{ secrets.PROJECT_PATH }}
            
            # 登录容器注册表
            echo "${{ secrets.ACR_PASSWORD }}" | sudo docker login ${{ env.REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
            
            # 获取新构建的镜像 URI
            BUILT_BACKEND_URI="${{ needs.build-backend.outputs.image-uri || '' }}"
            BUILT_FRONTEND_URI="${{ needs.build-frontend.outputs.image-uri || '' }}"
            
            # 从 .env.deployment 读取上次部署的镜像 URI
            LAST_BACKEND_URI=$(grep '^BACKEND_IMAGE_URI=' .env.deployment 2>/dev/null | cut -d '=' -f2- || echo "")
            LAST_FRONTEND_URI=$(grep '^FRONTEND_IMAGE_URI=' .env.deployment 2>/dev/null | cut -d '=' -f2- || echo "")
            
            # 确定最终使用的镜像 URI
            FINAL_BACKEND_URI="${BUILT_BACKEND_URI:-$LAST_BACKEND_URI}"
            FINAL_FRONTEND_URI="${BUILT_FRONTEND_URI:-$LAST_FRONTEND_URI}"
            
            # 验证镜像 URI 不为空
            if [ -z "$FINAL_BACKEND_URI" ] || [ -z "$FINAL_FRONTEND_URI" ]; then
              echo "错误: 缺少必要的镜像 URI，请检查上一次部署是否存在 .env.deployment 文件"
              exit 1
            fi
            
            # 更新部署配置文件
            cat > .env.deployment << EOF
            BACKEND_IMAGE_URI=${FINAL_BACKEND_URI}
            FRONTEND_IMAGE_URI=${FINAL_FRONTEND_URI}
            EOF
            
            # 定义需要重启的服务变量
            SERVICES_TO_RESTART=""
            
            # 如果后端镜像被构建，则拉取新镜像并标记相关服务需要重启
            if [ -n "$BUILT_BACKEND_URI" ]; then
              sudo docker pull "$FINAL_BACKEND_URI"
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART backend worker_default beat"
            fi
            
            # 如果前端镜像被构建，则拉取新镜像并标记相关服务需要重启
            if [ -n "$BUILT_FRONTEND_URI" ]; then
              sudo docker pull "$FINAL_FRONTEND_URI"
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART frontend-nginx"
            fi
            
            # 如果仅仅是 docker-compose.yml 等文件变更，也需要重启
            if [ "${{ needs.detect-changes.outputs.docker }}" = "true" ] && [ -z "$SERVICES_TO_RESTART" ]; then
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate
            elif [ -n "$SERVICES_TO_RESTART" ]; then
              # 精确重启已变更的服务
              sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --force-recreate $SERVICES_TO_RESTART
            else
              echo "没有检测到任何需要部署的变更。"
            fi
            
            # 清理未使用的镜像
            sudo docker image prune -f