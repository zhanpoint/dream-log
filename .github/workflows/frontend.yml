name: Deploy Frontend to Aliyun Server

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - 'nginx/**'
      - '.github/workflows/frontend.yml'

env:
  IMAGE_NAME: dream-log/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # context 设置为项目根目录，因为 Dockerfile 需要访问 frontend 和 nginx 目录
          context: .
          # 指定 Dockerfile 的路径
          file: nginx/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            echo "=== 登录到 GHCR... ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "=== 拉取最新的前端镜像... ==="
            cd ${{ secrets.PROJECT_PATH }}
            sudo docker compose pull frontend-nginx

            echo "=== 重启前端服务... ==="
            sudo docker compose up -d --remove-orphans frontend-nginx

            echo "=== 清理无用镜像... ==="
            sudo docker image prune -f
            
            echo "=== 前端部署成功！===" 