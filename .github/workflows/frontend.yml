name: Deploy Frontend to Aliyun Server

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

env:
  ACR_IMAGE_NAME: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/dream-log-frontend

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-22.04
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry (ACR)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata and build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.ACR_IMAGE_NAME }}:latest,${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,scope=${{ github.workflow }},mode=max

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            echo "=== Logging in to ACR on Server ==="
            echo "${{ secrets.ACR_PASSWORD }}" | sudo docker login ${{ secrets.ACR_REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

            echo "=== Updating deployment environment file (.env.deployment) ==="
            cd ${{ secrets.PROJECT_PATH }}
            
            # Preserve current backend image from .env.deployment or use a default
            CURRENT_BACKEND=$(grep '^BACKEND_IMAGE_URI=' .env.deployment 2>/dev/null | cut -d '=' -f2- || echo "${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/dream-log-backend:latest")

            # Create the .env.deployment file with the new frontend image and preserved backend image
            echo "FRONTEND_IMAGE_URI=${{ env.ACR_IMAGE_NAME }}:latest" > .env.deployment
            echo "BACKEND_IMAGE_URI=$CURRENT_BACKEND" >> .env.deployment
            
            echo "=== Applying changes to the stack (Frontend Update) ==="
            # Explicitly load BOTH .env (for secrets) and .env.deployment (for image URIs)
            sudo docker compose --env-file .env --env-file .env.deployment up -d --no-build --remove-orphans
            
            echo "=== Cleaning up unused images... ==="
            sudo docker image prune -f
            
            echo "=== Frontend deployed successfully! ===" 