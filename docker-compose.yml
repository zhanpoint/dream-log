services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dream-log-net

  cache:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dream-log-net

  backend:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    build:
      context: backend
    command: /app/scripts/start.sh
    volumes:
      - logs_volume:/app/logs
    env_file: ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: on-failure
    init: true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    expose:
      - "8000"
    networks:
      - dream-log-net

  worker:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    build:
      context: backend
    # 与后端 pyproject.toml 的 uv 脚本别名保持一致
    command: ["uv", "run", "worker"]
    env_file: ./.env
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: on-failure
    networks:
      - dream-log-net

  frontend:
    image: ${FRONTEND_IMAGE_URI:?FRONTEND_IMAGE_URI is not set or empty}
    build:
      context: frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file: ./.env
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
    expose:
      - "3000"
    networks:
      - dream-log-net

  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh -c
    command: >
      "set -e;
       # certbot image may not ship docker CLI; install a client to use the mounted docker.sock
       if ! command -v docker >/dev/null 2>&1; then
         if command -v apk >/dev/null 2>&1; then
           apk add --no-cache docker-cli >/dev/null;
         elif command -v apt-get >/dev/null 2>&1; then
           apt-get update -y >/dev/null;
           apt-get install -y --no-install-recommends docker.io >/dev/null;
         else
           echo 'docker CLI not found and no supported package manager (apk/apt-get) available.' 1>&2;
           exit 1;
         fi;
       fi;
       trap exit TERM;
       while :; do
         certbot renew --webroot -w /var/www/certbot --deploy-hook '
           NGINX_CID=$(docker ps -q
             --filter label=com.docker.compose.service=nginx
             --filter label=com.docker.compose.project=${COMPOSE_PROJECT_NAME:-dream_log}
             | head -n 1);
           if [ -n "$NGINX_CID" ]; then docker exec "$NGINX_CID" nginx -s reload; fi
         ';
         sleep 12h;
       done"
    restart: unless-stopped
    networks:
      - dream-log-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: on-failure
    networks:
      - dream-log-net

volumes:
  postgres_data:
  logs_volume: {}

networks:
  dream-log-net:
    driver: bridge
