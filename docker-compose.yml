# 服务的定义、数据卷的挂载、依赖关系 (depends_on)、环境变量的注入 (env_file) 配置
services:
  # 1. 数据库服务 (MySQL)
  # -------------------------------------
  db:
    image: mysql:8.0
    container_name: dream_log_db_mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "3306:3306"
    networks:
      - dream-log-net

  # 2. 缓存/Celery结果后端 (Redis)
  # -------------------------------------
  cache:
    image: redis:7-alpine
    container_name: dream_log_cache_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dream-log-net

  # 3. 消息代理 (RabbitMQ)
  # -------------------------------------
  broker:
    image: rabbitmq:3.13-management-alpine
    container_name: dream_log_broker_rabbitmq
    env_file: ./.env
    restart: unless-stopped
    ports:
      # 只暴露管理后台UI，并确保它有强密码保护
      - "15672:15672"
    expose:
      # AMQP协议端口仅对内部网络暴露，供Celery连接
      - "5672"
    networks:
      - dream-log-net

  # 4. 后端应用服务器 (Django with Daphne)
  # -------------------------------------
  backend:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    container_name: dream_log_backend_daphne
    command: >
      sh -c "
        chown -R appuser:appuser /app/logs /app/media &&
        echo 'Permissions adjusted for logs and media.' &&
        /app/scripts/start.sh
      "
    volumes:
      - static_volume:/app/staticfiles_collected
      - media_volume:/app/media
      - logs_volume:/app/logs
    env_file: ./.env
    environment:
      - APP_ENV=prod
    depends_on:
      - db
      - cache
      - broker
    restart: always
    healthcheck:
      test: ["CMD", "python", "manage.py", "check", "--deploy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    expose:
      - "8000"
    networks:
      - dream-log-net

  # 5a. 默认任务处理器 (处理 'default' 队列)
  worker_default:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    container_name: dream_log_worker_default
    command: >
      sh -c "
        chown -R appuser:appuser /app/logs &&
        echo 'Permissions adjusted for logs.' &&
        celery -A config worker -l info -Q default -n default_worker@%h
      "
    volumes:
      - logs_volume:/app/logs
    env_file: ./.env
    environment:
      - APP_ENV=prod
    depends_on:
      - backend
      - cache
      - broker
    restart: always
    networks:
      - dream-log-net


  # 新增: 5b. Celery Beat 定时任务调度器
  beat:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    container_name: dream_log_beat
    command: >
      sh -c "
        # 等待后端服务就绪，确保数据库迁移完成
        while ! nc -z backend 8000; do
          echo 'Waiting for backend service to be ready...';
          sleep 2;
        done;
        chown -R appuser:appuser /app/logs &&
        echo 'Permissions adjusted for logs.' &&
        celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
      "
    volumes:
      - logs_volume:/app/logs
    env_file: ./.env
    environment:
      - APP_ENV=prod
    depends_on:
      - db
      - cache
      - broker
    restart: always
    networks:
      - dream-log-net

  # 6. 前端/反向代理 (Nginx)
  # -------------------------------------
  frontend-nginx:
    image: ${FRONTEND_IMAGE_URI:?FRONTEND_IMAGE_URI is not set or empty}
    container_name: dream_log_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 配置文件依然从本地挂载，方便修改
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 静态文件和媒体文件卷挂载保持不变
      - static_volume:/app/staticfiles_collected:ro
      - media_volume:/app/media:ro
      # SSL 证书挂载保持不变
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - dream-log-net

# 数据卷定义 (移除 vite-cache，因为它只在构建时需要)
volumes:
  mysql_data:
  static_volume:
  media_volume: 
  logs_volume: {}

# 网络定义
networks:
  dream-log-net:
    driver: bridge
