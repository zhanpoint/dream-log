# 服务的定义、数据卷的挂载、依赖关系 (depends_on)、环境变量的注入 (env_file) 配置
services:
  # 1. 数据库服务 (MySQL)
  # -------------------------------------
  db:
    image: mysql:8.0
    container_name: dream_log_db_mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "3306:3306"
    networks:
      - dream-log-net

  # 2. LangGraph状态存储 (PostgreSQL)
  # -------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dream_log_postgres
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - dream-log-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 3. 缓存/Celery结果后端 (Redis)
  # -------------------------------------
  cache:
    image: redis:7-alpine
    container_name: dream_log_cache_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dream-log-net

  # 4. 消息代理 (RabbitMQ)
  # -------------------------------------
  broker:
    image: rabbitmq:3.13-management-alpine
    container_name: dream_log_broker_rabbitmq
    env_file: ./.env
    restart: unless-stopped
    ports:
      # 只暴露管理后台UI，并确保它有强密码保护
      - "15672:15672"
    expose:
      # AMQP协议端口仅对内部网络暴露，供Celery连接
      - "5672"
    networks:
      - dream-log-net

  # 5. 后端应用服务器 (Django with Daphne)
  # -------------------------------------
  backend:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    container_name: dream_log_backend_daphne
    command: /app/scripts/start.sh
    volumes:
      - static_volume:/app/staticfiles_collected
      - media_volume:/app/media
      - logs_volume:/app/logs
    env_file: ./.env
    environment:
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1,::1,backend,db,postgres,cache,broker,frontend-nginx,nginx,172.16.0.0/12,172.17.0.0/16,172.18.0.0/16,host.docker.internal
      - APP_ENV=prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - postgres
      - cache
      - broker
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "manage.py", "check", "--deploy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    expose:
      - "8000"
    networks:
      - dream-log-net

  # 6a. I/O密集型Worker (邮件、短信、网络请求、推送、社区互动)
  worker_io_cluster:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    container_name: dream_log_worker_io_cluster
    command: celery -A config.celery_app worker -l warning -Q io_queue -n io_cluster_worker@%h
    volumes:
      - logs_volume:/app/logs
    env_file: ./.env
    environment:
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1,::1,backend,db,postgres,cache,broker,frontend-nginx,nginx,172.16.0.0/12,172.17.0.0/16,172.18.0.0/16,host.docker.internal
      - APP_ENV=prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      cache:
        condition: service_started
      broker:
        condition: service_started
    restart: on-failure
    networks:
      - dream-log-net

