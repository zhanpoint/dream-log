services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dream_log_postgres
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dream-log-net

  cache:
    image: redis:7-alpine
    container_name: dream_log_cache_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dream-log-net

  backend:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    build:
      context: backend
    container_name: dream_log_backend
    command: /app/scripts/start.sh
    volumes:
      - logs_volume:/app/logs
    env_file: ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: on-failure
    expose:
      - "8000"
    networks:
      - dream-log-net

  worker:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    build:
      context: backend
    container_name: dream_log_worker
    command: python scripts/start_worker.py
    env_file: ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: on-failure
    networks:
      - dream-log-net

  frontend:
    image: ${FRONTEND_IMAGE_URI:?FRONTEND_IMAGE_URI is not set or empty}
    container_name: dream_log_frontend
    build:
      context: frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file: ./.env
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    expose:
      - "3000"
    networks:
      - dream-log-net

  certbot:
    image: certbot/certbot:latest
    container_name: dream_log_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM; while :; do
       certbot renew --webroot -w /var/www/certbot --deploy-hook 'docker exec dream_log_nginx nginx -s reload';
       sleep 12h;
      done"
    restart: unless-stopped
    networks:
      - dream-log-net

  nginx:
    image: nginx:1.27-alpine
    container_name: dream_log_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: on-failure
    networks:
      - dream-log-net

volumes:
  postgres_data:
  logs_volume: {}

networks:
  dream-log-net:
    driver: bridge
