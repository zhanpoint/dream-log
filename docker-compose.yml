  # 6g. Celery Beat 定时任务调度器
  beat:
    image: ${BACKEND_IMAGE_URI:?BACKEND_IMAGE_URI is not set or empty}
    container_name: dream_log_beat
    command: celery -A config.celery_app beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - logs_volume:/app/logs
    env_file: ./.env
    environment:
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1,::1,backend,db,postgres,cache,broker,frontend-nginx,nginx,172.16.0.0/12,172.17.0.0/16,172.18.0.0/16,host.docker.internal
      - APP_ENV=prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
      cache:
        condition: service_started
      broker:
        condition: service_started
    restart: on-failure
    networks:
      - dream-log-net

  # 7. 前端/反向代理 (Nginx)
  # -------------------------------------
  frontend-nginx:
    image: ${FRONTEND_IMAGE_URI:?FRONTEND_IMAGE_URI is not set or empty}
    container_name: dream_log_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 静态文件和媒体文件卷挂载保持不变（Nginx 配置已内置到镜像）
      - static_volume:/app/staticfiles_collected:ro
      - media_volume:/app/media:ro
      # SSL 证书挂载保持不变
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
    networks:
      - dream-log-net

# 数据卷定义 (移除 vite-cache，因为它只在构建时需要)
volumes:
  mysql_data:
  postgres_data:
  static_volume:
  media_volume: 
  logs_volume: {}

# 网络定义
networks:
  dream-log-net:
    driver: bridge
