# 服务的定义、数据卷的挂载、依赖关系 (depends_on)、环境变量的注入 (env_file) 配置
services:
  # 1. 数据库服务 (MySQL)
  # -------------------------------------
  db:
    image: mysql:8.0
    container_name: dream_log_db_mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    env_file: ./.env
    restart: unless-stopped
    expose:
      - "3306"

  # 2. 缓存/Celery结果后端 (Redis)
  # -------------------------------------
  cache:
    image: redis:7-alpine
    container_name: dream_log_cache_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: ./.env
    restart: unless-stopped
    expose:
      - "6379"

  # 3. 消息代理 (RabbitMQ)
  # -------------------------------------
  broker:
    image: rabbitmq:3.13-management-alpine
    container_name: dream_log_broker_rabbitmq
    env_file: ./.env
    restart: unless-stopped
    ports:
      # 只暴露管理后台UI，并确保它有强密码保护
      - "15672:15672"
    expose:
      # AMQP协议端口仅对内部网络暴露，供Celery连接
      - "5672"

  # 4. 后端应用服务器 (Django with Daphne)
  # -------------------------------------
  backend:
    image: ghcr.io/zhanpoint/dream-log/backend:latest
    container_name: dream_log_backend_daphne
    command: sh -c "python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - static_volume:/app/staticfiles_collected
      - media_volume:/app/media
    env_file: ./.env
    environment:
      - APP_ENV=prod
    depends_on:
      - db
      - cache
      - broker
    restart: unless-stopped
    expose:
      - "8000"

  # 5a. 默认任务处理器 (处理 'default' 队列)
  worker_default:
    image: ghcr.io/zhanpoint/dream-log/backend:latest
    container_name: dream_log_worker_default
    command: celery -A config worker -l info -Q default -n default_worker@%h
    env_file: ./.env
    environment:
      - APP_ENV=prod
    depends_on:
      - backend
      - cache
      - broker


  # 新增: 5b. Celery Beat 定时任务调度器
  beat:
    image: ghcr.io/zhanpoint/dream-log/backend:latest
    container_name: dream_log_beat
    # 使用 django-celery-beat 调度器，它将从数据库读取任务计划
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ./.env
    environment:
      - APP_ENV=prod
    depends_on:
      - db
      - cache
      - broker
    restart: unless-stopped

  # 6. 前端/反向代理 (Nginx)
  # -------------------------------------
  frontend-nginx:
    image: ghcr.io/zhanpoint/dream-log/frontend:latest
    container_name: dream_log_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 配置文件依然从本地挂载，方便修改
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 静态文件和媒体文件卷挂载保持不变
      - static_volume:/app/staticfiles_collected:ro
      - media_volume:/app/media:ro
      # SSL 证书挂载保持不变
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped

# 数据卷定义 (移除 vite-cache，因为它只在构建时需要)
volumes:
  mysql_data:
  static_volume:
  media_volume: 