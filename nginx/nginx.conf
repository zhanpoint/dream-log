# 全局 Nginx 配置
# 根据CPU核心数自动设置工作进程数
worker_processes  auto;
# 错误日志路径和日志级别（warn 表示警告级别）
error_log  /var/log/nginx/error.log warn;

# 进程 ID 文件路径
pid        /var/run/nginx.pid;

# 事件模块配置
events {
    # 每个工作进程的最大连接数，1024 是默认值
    worker_connections  1024;
}

# HTTP 配置
http {
    # 包含 MIME 类型配置文件
    include       /etc/nginx/mime.types;
    # 设置默认 MIME 类型
    default_type  application/octet-stream;

    # 设置默认 MIME 类型
    sendfile        on;
    # 启用 TCP_NOPUSH 功能，提高网络吞吐量
    tcp_nopush     on;
    # 设置客户端连接的保持时间
    keepalive_timeout  65;
    # 启用 gzip 压缩，减少传输数据量
    gzip  on;

    # 定义后端服务的上游(upstream)，'backend'是docker-compose中定义的服务名
    upstream backend {
        # 使用 ip_hash 策略，根据客户端IP进行哈希，确保同一个客户端的请求总是发送到同一个后端服务器
        # 如果需要会话保持，可以取消注释
        ip_hash;
        # 后端服务器的地址和端口（backend 是docker-compose中定义的服务名）
        server backend:8000;
    }

    # HTTP server: 将所有到80端口的HTTP请求重定向到HTTPS
    server {
        listen 80;
        server_name dreamlog.xyz www.dreamlog.xyz;
        
        # 将Let's Encrypt等证书颁发机构的验证请求也放在这里
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        # 健康检查端点（仅 HTTP，不跳转，不校验证书）
        location = /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        # 将所有到80端口的HTTP请求重定向到HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server: 处理所有加密流量
    server {
        listen 443 ssl;
        http2 on;
        server_name dreamlog.xyz www.dreamlog.xyz;
        charset utf-8;

        # SSL 证书路径 (请替换为您的实际路径)
        # SSL 证书路径 (请替换为您的实际路径)
        ssl_certificate /etc/nginx/ssl/live/dreamlog.xyz/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/dreamlog.xyz/privkey.pem;
        # 添加完整的信任证书链，以帮助解决 OCSP Stapling 问题
        ssl_trusted_certificate /etc/nginx/ssl/live/dreamlog.xyz/fullchain.pem;
        # 推荐的SSL安全设置 （TLSv1.2 TLSv1.3 是推荐的SSL协议版本）
        ssl_protocols TLSv1.2 TLSv1.3;
        # 推荐的SSL加密套件
        ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
        # 禁用SSL协商中的服务器首选项
        ssl_prefer_server_ciphers off;
        # 设置SSL会话缓存
        ssl_session_cache shared:SSL:10m;
        # 设置SSL会话超时时间
        ssl_session_timeout 1d;
        # OCSP Stapling：自 2025-05-07 起 Let's Encrypt 证书不再包含 OCSP URL，禁用以避免警告
        # ssl_stapling off;
        # ssl_stapling_verify off;

        # 为 OCSP Stapling 指定 DNS 解析器
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Nginx将提供的静态文件的根目录 (React build产物)
        root /usr/share/nginx/html;

        # 设置默认索引文件
        index index.html index.htm;

        # 拦截常见的恶意扫描，直接返回 403 Forbidden
        location ~* /(wp-admin|wp-login|setup-config)\.php$ {
            return 403;
        }

        # 处理前端React应用的路由
        location / {
            # 尝试从多个路径中查找文件，如果找不到则返回 index.html
            try_files $uri $uri/ /index.html;
        }

        # 将 /api/ 开头的请求代理到Django后端
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # 处理WebSocket连接 (/ws/)
        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 处理Django Admin等后台的静态文件
        location /static/ {
            alias /app/staticfiles_collected/;
        }

        # 处理用户上传的媒体文件
        location /media/ {
            alias /app/media/;
        }

        # 处理错误页面（50x.html 是Nginx的默认错误页面）
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}